<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>N5XT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="GSC.css"/>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanline"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-logo">
    <svg viewBox="0 0 60 60" fill="none">
      <polygon points="30,4 56,18 56,42 30,56 4,42 4,18" stroke="#00f5d4" stroke-width="2" fill="none"/>
      <circle cx="30" cy="30" r="6" fill="#00f5d4"/>
    </svg>
    <span class="nav-brand">N5XT</span>
  </div>
  <div class="nav-right">
    <div class="nav-pill">
      <div class="nav-av" id="navAv">P</div>
      <span class="nav-uname" id="navUn">PLAYER</span>
    </div>
    <button class="btn-out" type="button" id="logoutBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      LOGOUT
    </button>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <p class="eyebrow">WELCOME BACK, <span id="heroName">PLAYER</span></p>
  <h1 class="hero-h1">SELECT <span class="ac">YOUR GAME</span></h1>
  <p class="hero-sub">Choose from our game   collection and jump right in</p>
  <div class="srch-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="srchIn" placeholder="Search games..." autocomplete="off"/>
  </div>
</header>

<!-- FILTERS -->
<div class="filters">
  <button class="fb on" data-g="all">ALL GAMES</button>
  <button class="fb" data-g="action">ACTION</button>
  <button class="fb" data-g="gambling">GAMBLING</button>
  <button class="fb" data-g="strategy">STRATEGY</button>
  <button class="fb" data-g="racing">RACING</button>
  <button class="fb" data-g="sports">SPORTS</button>
</div>

<!-- GAME GRID -->
<main class="ggrid" id="gameGrid"></main>

<!-- MODAL -->
<div class="mbg" id="mbg">
  <div class="modal">
    <button class="mx" type="button" id="mClose">&#x2715;</button>
    <div class="mthumb" id="mthumb"></div>
    <div class="mbody">
      <div class="mmeta">
        <span class="gtag" id="mtag"></span>
        <span class="mstars" id="mstars"></span>
      </div>
      <h2 class="mtitle" id="mtitle"></h2>
      <p class="mdesc" id="mdesc"></p>
      <div class="mstats" id="mstatsEl"></div>
      <button class="btn-play" type="button" id="playBtn">
        <span>&#9654;&nbsp; PLAY NOW</span>
        <span class="pshine"></span>
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="sharedJ.js"></script>
<script src="GSJ.js"></script>
</body>
</html>
