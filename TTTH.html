<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIC·TAC·TOE — Human vs AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"/>
<link rel="stylesheet" href="TTTC.css">
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="ttt-topbar">
  <button class="ttt-vault-btn" onclick="location.href='GSH.html'">
    &#8592; N5XT
  </button>
  <div class="ttt-topbar-title">TIC&#xB7;TAC&#xB7;TOE</div>
  <div class="ttt-topbar-right">
    <div class="java-badge" id="java-badge">
      <span class="java-dot" id="java-dot"></span>
      <span id="java-label">JAVA ENGINE</span>
    </div>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="title">TIC&#xB7;TAC&#xB7;TOE</div>
    <div class="subtitle">Human Interface vs Java Neural Engine</div>
  </div>

  <div class="scoreboard">
    <div class="score-cell you">
      <div class="score-label">You</div>
      <div class="score-num" id="score-you">0</div>
    </div>
    <div class="score-cell draw">
      <div class="score-label">Draw</div>
      <div class="score-num" id="score-draw">0</div>
    </div>
    <div class="score-cell ai">
      <div class="score-label">AI</div>
      <div class="score-num" id="score-ai">0</div>
    </div>
  </div>

  <div class="player-tokens">
    <div class="token you-token" id="token-you">
      <span class="token-sym">X</span>
      <span>You</span>
    </div>
    <div class="vs-divider">VS</div>
    <div class="token ai-token" id="token-ai">
      <span class="token-sym">O</span>
      <span id="engine-label">Java AI</span>
    </div>
  </div>

  <div class="status-bar your-turn" id="status">YOUR MOVE</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"><span class="cell-symbol" id="c0"></span></div>
    <div class="cell" data-i="1"><span class="cell-symbol" id="c1"></span></div>
    <div class="cell" data-i="2"><span class="cell-symbol" id="c2"></span></div>
    <div class="cell" data-i="3"><span class="cell-symbol" id="c3"></span></div>
    <div class="cell" data-i="4"><span class="cell-symbol" id="c4"></span></div>
    <div class="cell" data-i="5"><span class="cell-symbol" id="c5"></span></div>
    <div class="cell" data-i="6"><span class="cell-symbol" id="c6"></span></div>
    <div class="cell" data-i="7"><span class="cell-symbol" id="c7"></span></div>
    <div class="cell" data-i="8"><span class="cell-symbol" id="c8"></span></div>
  </div>

  <div class="difficulty-row">
    <span class="diff-label">Difficulty:</span>
    <div class="diff-options">
      <button class="diff-btn" data-d="easy">Easy</button>
      <button class="diff-btn active" data-d="medium">Medium</button>
      <button class="diff-btn" data-d="hard">Hard</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-cyan" id="btn-new">New Game</button>
    <button class="btn btn-vault" onclick="location.href='GSH.html'">&#8592; N5XT</button>
  </div>

  <!-- Java server instructions banner -->
  <div class="java-info" id="java-info">
    <span class="java-info-icon"></span>
    <span id="java-info-text">Connecting to Java engine on <code>localhost:8765</code>…</span>
  </div>
</div>

<script src="shared.js"></script>
<script src="TTTJ.js"></script>
</body>
</html>
