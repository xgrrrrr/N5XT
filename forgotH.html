<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>N5XT</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="forgotC.css"/>
</head>
<body>
<div class="bg-grid"></div>
<div class="scanline"></div>

<div class="auth-wrap">

  <div class="logo-block">
    <div class="logo-hex">
      <svg viewBox="0 0 60 60" fill="none">
        <polygon points="30,4 56,18 56,42 30,56 4,42 4,18" stroke="#00f5d4" stroke-width="2" fill="none"/>
        <polygon points="30,14 46,23 46,37 30,46 14,37 14,23" stroke="#ff006e" stroke-width="1.5" fill="rgba(0,245,212,0.06)"/>
        <circle cx="30" cy="30" r="6" fill="#00f5d4"/>
      </svg>
    </div>
    <h1 class="logo-name">N5XT</h1>
    <p class="logo-tag">RESET YOUR PASSWORD</p>
  </div>

  <div class="card" id="forgotCard">
    <div class="card-glow"></div>

    <!-- Panel A: Email -->
    <div class="panel" id="fpa">
      <div class="reset-ico">
        <svg viewBox="0 0 60 60" fill="none">
          <circle cx="30" cy="30" r="27" stroke="#ff006e" stroke-width="2"/>
          <rect x="24" y="15" width="12" height="15" rx="3" stroke="#ff006e" stroke-width="2" fill="none"/>
          <path d="M20 30h20v15H20z" stroke="#ff006e" stroke-width="2" fill="rgba(255,0,110,0.08)"/>
          <circle cx="30" cy="37" r="2" fill="#ff006e"/>
          <line x1="30" y1="39" x2="30" y2="42" stroke="#ff006e" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="reset-desc">Enter your account email — we'll send you a 6-digit verification code.</p>
      <div class="field">
        <label>EMAIL ADDRESS</label>
        <div class="frow">
          <span class="fico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input type="email" id="fEmail" placeholder="your@email.com" autocomplete="off"/>
          <span class="ubar"></span>
        </div>
      </div>
      <p class="msg" id="fErr1"></p>
      <button class="btn" id="fFindBtn" type="button">
        <span class="btn-lbl">SEND CODE</span>
        <span class="btn-spin"></span>
        <span class="btn-shine"></span>
      </button>
    </div>

    <!-- Panel OTP: Verify code -->
    <div class="panel hide" id="fpOtp">
      <div class="found-badge">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span id="fFoundName">USERNAME</span>
      </div>
      <p class="otp-label">VERIFICATION CODE</p>
      <p class="otp-hint" id="fOtpHint">Code sent to your email.</p>
      <div class="otp-boxes">
        <input class="fotp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="off"/>
        <input class="fotp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="off"/>
        <input class="fotp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="off"/>
        <input class="fotp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="off"/>
        <input class="fotp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="off"/>
        <input class="fotp-digit" type="text" inputmode="numeric" maxlength="1" autocomplete="off"/>
      </div>
      <p class="msg" id="fErr2"></p>
      <button class="btn" id="fOtpVerifyBtn" type="button">
        <span class="btn-lbl">VERIFY CODE</span>
        <span class="btn-spin"></span>
        <span class="btn-shine"></span>
      </button>
      <div class="otp-footer">
        <button id="fOtpResend" type="button" class="link-btn">Resend code</button>
        <span id="fOtpTimer" class="timer-txt"></span>
      </div>
      <button id="fOtpBack" type="button" class="back-link">&#8249; Back</button>
    </div>

    <!-- Panel B: New password -->
    <div class="panel hide" id="fpb">
      <div class="field">
        <label>NEW PASSWORD</label>
        <div class="frow">
          <span class="fico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" id="fNewPass" placeholder="Enter new password"/>
          <button class="eye" type="button" id="fEye1">
            <svg class="eo" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="ec" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
          <span class="ubar"></span>
        </div>
        <div class="str-wrap">
          <div class="str-bar"><span id="fsb1"></span><span id="fsb2"></span><span id="fsb3"></span><span id="fsb4"></span></div>
          <span class="str-lbl" id="fStrLbl">Enter a password</span>
        </div>
      </div>
      <div class="field">
        <label>CONFIRM NEW PASSWORD</label>
        <div class="frow">
          <span class="fico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" id="fConfPass" placeholder="Repeat new password"/>
          <button class="eye" type="button" id="fEye2">
            <svg class="eo" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="ec" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
          <span class="ubar"></span>
        </div>
      </div>
      <p class="msg" id="fErr3"></p>
      <div class="btn-row">
        <button class="btn-sec" type="button" id="fBack">&#8249; BACK</button>
        <button class="btn flex1" type="button" id="fResetBtn">
          <span class="btn-lbl">RESET PASSWORD</span>
          <span class="btn-spin"></span>
          <span class="btn-shine"></span>
        </button>
      </div>
    </div>

    <!-- Panel C: Success -->
    <div class="panel hide" id="fpc">
      <div class="suc-wrap">
        <div class="suc-ico"><svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" stroke="#00f5d4" stroke-width="2"/><polyline points="18,30 26,38 42,22" stroke="#00f5d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h2 class="suc-title">PASSWORD RESET!</h2>
        <p class="suc-sub">Your password has been updated.</p>
        <p class="suc-sub" style="margin-top:.4rem">Taking you to login...</p>
        <div class="rbar"><div class="rfill" id="fFill"></div></div>
      </div>
    </div>

    <div class="lrow" id="fLoginRow">Remember it? <a href="index.html" class="lnk">Sign in</a></div>
  </div>

</div>

<script src="sharedJ.js"></script>
<script src="api.js"></script>
<script src="forgotJ.js"></script>
</body>
</html>
